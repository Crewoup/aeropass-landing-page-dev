<svg xmlns="http://www.w3.org/2000/svg" viewBox="56 56 467 148" width="467" height="148">
  <defs>
    <linearGradient id="goldBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff8dc"/>
      <stop offset="30%"  stop-color="#e8c858"/>
      <stop offset="60%"  stop-color="#a87820"/>
      <stop offset="85%"  stop-color="#d4a030"/>
      <stop offset="100%" stop-color="#7a5510"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="15%"  stop-color="#fff5a0"/>
      <stop offset="40%"  stop-color="#e8c040"/>
      <stop offset="70%"  stop-color="#b07818"/>
      <stop offset="100%" stop-color="#7a5010"/>
    </linearGradient>
    <linearGradient id="wingBarL" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#fff5a0"/>
      <stop offset="100%" stop-color="#8a6018" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="wingBarR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#fff5a0"/>
      <stop offset="100%" stop-color="#8a6018" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="goldCircle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff5a0"/>
      <stop offset="50%"  stop-color="#d4a030"/>
      <stop offset="100%" stop-color="#7a5510"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ FOUR STRIPES ══ -->
  <g filter="url(#glow2)">
    <rect x="60"  y="60" width="19" height="140" rx="2.5" fill="url(#goldBar)"/>
    <rect x="88"  y="60" width="19" height="140" rx="2.5" fill="url(#goldBar)"/>
    <rect x="116" y="60" width="19" height="140" rx="2.5" fill="url(#goldBar)"/>
    <rect x="144" y="60" width="19" height="140" rx="2.5" fill="url(#goldBar)"/>
    <rect x="64"  y="60" width="5"  height="140" rx="1"   fill="white" opacity="0.13"/>
    <rect x="92"  y="60" width="5"  height="140" rx="1"   fill="white" opacity="0.13"/>
    <rect x="120" y="60" width="5"  height="140" rx="1"   fill="white" opacity="0.13"/>
    <rect x="148" y="60" width="5"  height="140" rx="1"   fill="white" opacity="0.13"/>
  </g>

  <!-- ══ WINGS ══ -->
  <g transform="translate(424, 78)" filter="url(#glow2)">
    <rect x="-95" y="-18" width="75" height="8" rx="2" fill="url(#wingBarL)"/>
    <rect x="-74" y="-6"  width="54" height="8" rx="2" fill="url(#wingBarL)" opacity="0.82"/>
    <rect x="-53" y="6"   width="33" height="8" rx="2" fill="url(#wingBarL)" opacity="0.60"/>
    <rect x="20"  y="-18" width="75" height="8" rx="2" fill="url(#wingBarR)"/>
    <rect x="20"  y="-6"  width="54" height="8" rx="2" fill="url(#wingBarR)" opacity="0.82"/>
    <rect x="20"  y="6"   width="33" height="8" rx="2" fill="url(#wingBarR)" opacity="0.60"/>
    <circle cx="0" cy="0" r="20" fill="white" stroke="url(#goldCircle)" stroke-width="2.2"/>
    <polygon
      points="0,-14 3.3,-5 13,-5 5.5,1.5 8.5,11 0,5.5 -8.5,11 -5.5,1.5 -13,-5 -3.3,-5"
      fill="url(#goldCircle)"
    />
  </g>

  <!-- ══ WORDMARK ══ -->
  <text
    x="195" y="180"
    font-family="'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif"
    font-weight="300"
    font-size="68"
    letter-spacing="1"
    fill="url(#goldText)"
    filter="url(#glow)"
  >Captain.ai</text>

</svg>
