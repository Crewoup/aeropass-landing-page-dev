<svg xmlns="http://www.w3.org/2000/svg" viewBox="56 56 467 148" width="467" height="148">
  <defs>
    <linearGradient id="cyanBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#00F0FF"/>
      <stop offset="80%"  stop-color="#0080FF"/>
      <stop offset="100%" stop-color="#004080"/>
    </linearGradient>
    <linearGradient id="cyanText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <linearGradient id="wingBarL" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#004080" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="wingBarR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#004080" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="cyanCircle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ FOUR STRIPES ══ -->
  <g filter="url(#glow2)">
    <rect x="60"  y="60" width="16" height="140" fill="url(#cyanBar)"/>
    <rect x="88"  y="60" width="16" height="140" fill="url(#cyanBar)"/>
    <rect x="116" y="60" width="16" height="140" fill="url(#cyanBar)"/>
    <rect x="144" y="60" width="16" height="140" fill="url(#cyanBar)"/>
    <!-- Highlight -->
    <rect x="62"  y="60" width="4"  height="140" fill="white" opacity="0.3"/>
    <rect x="90"  y="60" width="4"  height="140" fill="white" opacity="0.3"/>
    <rect x="118" y="60" width="4"  height="140" fill="white" opacity="0.3"/>
    <rect x="146" y="60" width="4"  height="140" fill="white" opacity="0.3"/>
  </g>

  <!-- ══ WINGS ══ -->
  <g transform="translate(424, 78)" filter="url(#glow2)">
    <!-- Left Wing -->
    <rect x="-95" y="-18" width="75" height="6" fill="url(#wingBarL)"/>
    <rect x="-74" y="-6"  width="54" height="6" fill="url(#wingBarL)" opacity="0.82"/>
    <rect x="-53" y="6"   width="33" height="6" fill="url(#wingBarL)" opacity="0.60"/>
    
    <!-- Right Wing -->
    <rect x="20"  y="-18" width="75" height="6" fill="url(#wingBarR)"/>
    <rect x="20"  y="-6"  width="54" height="6" fill="url(#wingBarR)" opacity="0.82"/>
    <rect x="20"  y="6"   width="33" height="6" fill="url(#wingBarR)" opacity="0.60"/>
    
    <!-- Center Tech Node -->
    <rect x="-16" y="-16" width="32" height="32" fill="#0A0F1A" stroke="url(#cyanCircle)" stroke-width="2.5"/>
    <polygon
      points="0,-10 3.3,-3 10,-3 4.5,2 6.5,9 0,4.5 -6.5,9 -4.5,2 -10,-3 -3.3,-3"
      fill="url(#cyanCircle)"
    />
  </g>

  <!-- ══ WORDMARK ══ -->
  <text
    x="180" y="175"
    font-family="'Roboto Mono', 'Courier New', monospace"
    font-weight="700"
    font-size="64"
    letter-spacing="2"
    fill="url(#cyanText)"
    filter="url(#glow)"
  >CAPTAIN.AI</text>

</svg>
